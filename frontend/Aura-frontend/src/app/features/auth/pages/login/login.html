<section class="login-scene">
  <app-cinematic-login-background></app-cinematic-login-background>

  <div class="login-overlay">
    <article class="login-card">
      <p class="eyebrow">AURA SOCIAL</p>
      <h1>Volver a entrar</h1>
      <p class="subtitle">Tu comunidad te esta esperando.</p>

      <form class="login-form" autocomplete="on">
        <label>
          <span>Usuario o correo</span>
          <input type="text" name="usuario" placeholder="santi123" />
        </label>

        <label>
          <span>Contrasena</span>
          <input type="password" name="contrasena" placeholder="********" />
        </label>

        <button type="button">Ingresar</button>
      </form>
    </article>
  </div>
</section>
