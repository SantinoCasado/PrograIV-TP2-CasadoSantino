<div class="modal-overlay" (click)="cerrarForm()">
  <div class="modal-panel ani-fade-up" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-titulo"><i class="bi bi-pencil-square"></i> Nueva publicación</h2>
      <button type="button" class="btn-cerrar" (click)="cerrarForm()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="enviar()">
      <div class="modal-body">
        <div class="campo">
          <label class="campo-label">Título</label>
          <input
            type="text"
            class="campo-input"
            [class.error]="intentoEnvio && tituloControl?.invalid"
            formControlName="titulo"
            placeholder="¿De qué trata tu publicación?"
          />
          <div class="campo-meta">
            <span class="campo-error" *ngIf="intentoEnvio && tituloControl?.hasError('required')">
              El título es obligatorio.
            </span>
            <span class="campo-error" *ngIf="intentoEnvio && tituloControl?.hasError('maxlength')">
              Máximo 70 caracteres.
            </span>
            <span class="campo-contador"> {{ tituloControl?.value?.length || 0 }}/70 </span>
          </div>
        </div>

        <div class="campo">
          <label class="campo-label">Mensaje</label>
          <textarea
            AutoResizeDirective
            class="campo-input campo-textarea"
            [class.error]="intentoEnvio && mensajeControl?.invalid"
            formControlName="mensaje"
            placeholder="Contá lo que quieras..."
            rows="4"
          ></textarea
          ><!-- Implementacion de directiva propia -->
          <div class="campo-meta">
            <span class="campo-error" *ngIf="intentoEnvio && mensajeControl?.hasError('required')">
              El mensaje es obligatorio.
            </span>
            <span class="campo-error" *ngIf="intentoEnvio && mensajeControl?.hasError('maxlength')">
              Máximo 500 caracteres.
            </span>
            <span class="campo-contador"> {{ mensajeControl?.value?.length || 0 }}/500 </span>
          </div>
        </div>

        <div class="campo">
          <label class="campo-label">Imagen <span class="opcional">(opcional)</span></label>

          <div *ngIf="imagenPreview()" class="imagen-preview">
            <img [src]="imagenPreview()" alt="Preview" />
            <button type="button" class="btn-quitar-img" (click)="eliminarImagen()">
              <i class="bi bi-x-circle-fill"></i>
            </button>
          </div>

          <label *ngIf="!imagenPreview()" class="campo-file" for="imagen-input">
            <i class="bi bi-image"></i>
            <span>Seleccionar imagen</span>
            <input
              id="imagen-input"
              type="file"
              accept="image/jpeg,image/png,image/webp"
              (change)="onImagenSeleccionada($event)"
              hidden
            />
          </label>
        </div>

        <div *ngIf="mensajeError()" class="mensaje-error">
          <i class="bi bi-exclamation-triangle"></i>
          {{ mensajeError() }}
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancelar" (click)="cerrarForm()">Cancelar</button>
        <button type="submit" class="btn-publicar" [disabled]="cargando()">
          <span *ngIf="!cargando()"> <i class="bi bi-send"></i> Publicar </span>
          <span *ngIf="cargando()">
            <div class="spinner-sm"></div>
            Publicando...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
